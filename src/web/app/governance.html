<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Jules AI | Runtime Governance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { background: #020617; color: white; font-family: sans-serif; }
        .glass { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-12">
    <h1 class="text-4xl font-bold mb-12">Runtime <span class="text-sky-400">Governance</span></h1>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        <!-- ARI Scores -->
        <div class="glass p-8 rounded-3xl">
            <h3 class="text-xl font-bold mb-6">Agency-Risk Index (ARI)</h3>
            <div id="ari-list" class="space-y-4">
                <div class="flex justify-between items-center">
                    <span class="text-sm">UVIAP_Agent</span>
                    <span class="px-2 py-1 bg-emerald-500/20 text-emerald-400 text-[10px] rounded font-bold">L1 - MINIMAL</span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="text-sm">CognitiveScraper</span>
                    <span class="px-2 py-1 bg-sky-500/20 text-sky-400 text-[10px] rounded font-bold">L2 - SANDBOX</span>
                </div>
            </div>
        </div>

        <!-- Containment Events -->
        <div class="glass p-8 rounded-3xl">
            <h3 class="text-xl font-bold mb-6">Containment Tracker</h3>
            <div id="containment-log" class="space-y-2">
                <div class="text-[10px] text-slate-500 font-mono">2024-05-23 10:45:01 -> [INFO] System Nominal</div>
            </div>
        </div>

        <!-- ATS Live Feed -->
        <div class="glass p-8 rounded-3xl">
            <h3 class="text-xl font-bold mb-6">Live ATS Telemetry</h3>
            <div id="ats-feed" class="h-64 overflow-y-auto space-y-2 font-mono text-[8px] text-sky-400">
                <!-- Live entries -->
            </div>
        </div>
    </div>

    <script>
        // Simulation of WebSocket updates
        function addAtsEvent() {
            const feed = document.getElementById('ats-feed');
            const event = document.createElement('div');
            event.textContent = `[ATS v2.0.0] ${new Date().toLocaleTimeString()} - tool.invoke -> registry_read (id: ${Math.random().toString(36).substr(2, 5)})`;
            feed.prepend(event);
            if(feed.children.length > 20) feed.lastChild.remove();
        }
        setInterval(addAtsEvent, 2000);
    </script>
</body>
</html>
