name: QEP Continuous Integration

on:
  push:
    branches: [ main, feature/* ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy scipy scikit-learn pandas sqlalchemy fastapi uvicorn pytest pytest-asyncio networkx deap httpx
    - name: Run Backend Tests
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        pytest tests/test_religious_domain.py tests/test_reactor_ecosystem.py
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Frontend Dependencies
      run: |
        cd src/qep_frontend
        npm install
    - name: Build Frontend
      run: |
        cd src/qep_frontend
        npm run build
