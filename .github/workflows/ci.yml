name: Jules AI v99 TRANSCENDENT CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test on ${{ matrix.os }} (Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ['3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-asyncio

    - name: Verify Environment
      run: python scripts/verify_environment.py

    - name: Run Grand Synthesis
      run: python -m agentic_core.synthesis.grand_synthesis_engine

    - name: Run Transcendent Tests
      run: pytest tests/test_v99_transcendent.py

    - name: Run Genomic Tests
      run: pytest tests/genomic/

  frontend:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install Frontend Dependencies
      run: |
        cd src/qep_frontend
        npm install
    - name: Build Frontend
      run: |
        cd src/qep_frontend
        npm run build
